<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TERMINAL://FNAF_OVERRIDE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

    :root {
      --matrix-green: #00ff41;
      --dark-glow: #003b00;
      --bg-black: #050505;
      --font-main: 'Fira Code', monospace;
    }

    * {
      box-sizing: border-box;
      cursor: crosshair;
    }

    html, body {
      margin: 0;
      height: 100%;
      background-color: var(--bg-black);
      color: var(--matrix-green);
      font-family: var(--font-main);
      overflow: hidden;
    }

    /* Matrix Rain Canvas */
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* CRT Scanline Effect */
    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 100;
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
      opacity: 0.4;
    }

    /* Opening Boot Sequence Overlay */
    #boot-sequence {
      position: fixed;
      inset: 0;
      background: var(--bg-black);
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 40px;
      font-size: 1.1rem;
      line-height: 1.5;
      overflow: hidden;
    }

    .boot-line {
      margin: 0;
      opacity: 0;
      animation: fadeIn 0.1s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    /* Main App Interface */
    .app {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .terminal-box {
      width: min(1000px, 95vw);
      background: rgba(0, 15, 0, 0.85);
      border: 1px solid var(--matrix-green);
      box-shadow: 0 0 20px var(--dark-glow);
      padding: 30px;
      position: relative;
    }

    h1 {
      font-size: 2.2rem;
      text-transform: uppercase;
      margin: 0;
      letter-spacing: 5px;
      border-bottom: 2px solid var(--matrix-green);
      padding-bottom: 10px;
      margin-bottom: 20px;
      text-shadow: 0 0 10px var(--matrix-green);
      animation: flicker 3s infinite;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 15px;
    }

    /* Hacker Buttons */
    .game-btn {
      background: transparent;
      border: 1px solid var(--matrix-green);
      color: var(--matrix-green);
      padding: 15px;
      font-family: var(--font-main);
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .game-btn:hover {
      background: var(--matrix-green);
      color: var(--bg-black);
      box-shadow: 0 0 15px var(--matrix-green);
      transform: translateY(-2px);
    }

    .game-btn::before {
      content: "[ ";
    }
    .game-btn::after {
      content: " ]";
    }

    .status-bar {
      margin-top: 20px;
      font-size: 0.8rem;
      display: flex;
      justify-content: space-between;
      opacity: 0.7;
    }

    @keyframes flicker {
      0%, 19.999%, 22%, 62.999%, 64%, 100% { opacity: 1; }
      20%, 21.999%, 63% { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- Initial Boot Screen -->
  <div id="boot-sequence"></div>

  <!-- Main Terminal UI -->
  <main class="app" id="main-ui">
    <div class="terminal-box">
      <h1>FNAF_ACCESS_GRANTED</h1>
      
      <section class="grid">
        <button class="game-btn" onclick="openFNAF1()">Initialize_FNAF_1</button>
        <button class="game-btn" onclick="openFNAF2()">Initialize_FNAF_2</button>
        <button class="game-btn" onclick="openFNAF3()">Initialize_FNAF_3</button>
        <button class="game-btn" onclick="openFNAF4()">Initialize_FNAF_4</button>
        <button class="game-btn" onclick="openFNAFWorld()">Run_FNAF_World</button>
        <button class="game-btn" onclick="openSisterLocation()">Load_Sister_Loc</button>
        <button class="game-btn" onclick="openPizzeriaSimulator()">Exec_Pizzeria_Sim</button>
        <button class="game-btn" onclick="openUCN()">Deploy_UCN</button>
      </section>

      <div class="status-bar">
        <span>STATUS: ENCRYPTED</span>
        <span>LOCATION: FAZBEAR_SERVER_7</span>
        <span>UID: 87-SPRINGTRAP</span>
      </div>
    </div>
  </main>

  <script>
    // 1. Matrix Rain Implementation
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#0F0';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          rainDrops[i] = 0;
        }
        rainDrops[i]++;
      }
    }
    setInterval(drawMatrix, 35);

    // 2. Opening Boot Sequence
    const bootContainer = document.getElementById('boot-sequence');
    const logs = [
      "> INITIALIZING BOOT PROTOCOL...",
      "> BYPASSING FAZBEAR SECURITY FIREWALL...",
      "> LOCATING SERVER NODES...",
      "> MOUNTING VIRTUAL DISK: /DEV/FNAF/GAMES",
      "> DECRYPTING ASSETS...",
      "> HIJACKING PACKET STREAM...",
      "> CONNECTION SECURE.",
      "> WELCOME, AFTON."
    ];

    async function runBoot() {
      for (const log of logs) {
        const p = document.createElement('p');
        p.className = 'boot-line';
        p.textContent = log;
        bootContainer.appendChild(p);
        await new Promise(r => setTimeout(r, 400));
      }
      setTimeout(() => {
        bootContainer.style.display = 'none';
        document.getElementById('main-ui').style.opacity = '1';
      }, 500);
    }
    runBoot();

    // 3. Core Launcher Logic (Preserved)
    function openInIframe(name, url) {
      var win = window.open();
      if (!win) {
        alert("TERMINAL ERROR: POPUP BLOCKED. GRANT ACCESS.");
        return;
      }

      win.document.open();
      win.document.write(`
        <html><head><title>about:blank</title>
        <style>
          body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
          .loader { border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 10px #0f0; }
          iframe { width: 100vw; height: 100vh; border: none; display: none; }
        </style></head>
        <body>
          <div id="loading" class="loader">TUNNELING TO NODE... PLEASE WAIT.</div>
          <iframe id="frame" src="${url}"></iframe>
          <script>
            const f = document.getElementById('frame');
            f.onload = () => {
              document.getElementById('loading').style.display = 'none';
              f.style.display = 'block';
            };
          <\/script>
        </body></html>
      `);
      win.document.close();
    }

    // Individual Game Mappings
    const openFNAF1 = () => openInIframe("FNAF 1", "1/index.html");
    const openFNAF2 = () => openInIframe("FNAF 2", "2/index.html");
    const openFNAF3 = () => openInIframe("FNAF 3", "3/index.html");
    const openFNAF4 = () => openInIframe("FNAF 4", "4/index.html");
    const openFNAFWorld = () => openInIframe("FNAF World", "w/index.html");
    const openSisterLocation = () => openInIframe("Sister Location", "sl/index.html");
    const openPizzeriaSimulator = () => openInIframe("Pizzeria Simulator", "ps/index.html");
    const openUCN = () => openInIframe("UCN", "ucn/index.html");

    // Handle Window Resize for Canvas
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
